name: CD — Build & Push API Image

on:
  push:
    branches: [main]

# Required permissions for GHCR push
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build Docker image → ghcr.io
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Docker Buildx ────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Login to GitHub Container Registry ───────────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Derive image tag from git SHA and branch ─────────────────────────
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/fire-detection-api
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      # ── Build + Push ──────────────────────────────────────────────────────
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer cache via GHCR
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/fire-detection-api:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/fire-detection-api:buildcache,mode=max

      # ── Summary ───────────────────────────────────────────────────────────
      - name: Print image digest
        run: |
          echo "Image pushed:"
          echo "  ${{ steps.meta.outputs.tags }}"
