name: CD — Build & Push API Image

on:
  push:
    branches: [main]
  workflow_dispatch:   # Cho phép build thủ công từ GitHub UI

# Required permissions for GHCR push
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build Docker image → ghcr.io
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      # ── Convert repo name to lowercase (GHCR requirement) ──────────────────
      - name: Set lowercase image name
        run: |
          echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/fire-detection-api" >> $GITHUB_ENV

      # ── Login to GitHub Container Registry ─────────────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Derive image tags from git SHA and branch ──────────────────────────
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      # ── Build + Push ───────────────────────────────────────────────────────
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max

      # ── Summary ────────────────────────────────────────────────────────────
      - name: Print image digest
        run: |
          echo "========================================"
          echo "  Docker image pushed to GHCR:"
          echo "  ${{ steps.meta.outputs.tags }}"
          echo "========================================"
