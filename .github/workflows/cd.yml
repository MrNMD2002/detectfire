name: CD — Build & Push API Image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

defaults:
  run:
    shell: bash

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    name: Build Docker image → ghcr.io
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      # ── Lowercase image name (GHCR requirement) ────────────────────────────
      - name: Set lowercase image name
        run: |
          echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/fire-detection-api" >> $GITHUB_ENV

      # ── Setup Docker Buildx ────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker   # dùng Docker daemon có sẵn, không cần buildkit riêng

      # ── Login GHCR ─────────────────────────────────────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Extract tags ───────────────────────────────────────────────────────
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      # ── Build + Push (dùng local Docker cache, không cần registry cache) ──
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # ── Summary ────────────────────────────────────────────────────────────
      - name: Print image digest
        run: |
          echo "========================================"
          echo "  Docker image pushed to GHCR:"
          echo "  ${{ steps.meta.outputs.tags }}"
          echo "========================================"
