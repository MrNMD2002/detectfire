name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1 — Lint
  # ──────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check src/ tests/

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2 — Unit tests (framework stages only — no GPU, no MLflow, no training)
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install framework dependencies
        # torch / ultralytics are commented-out in requirements.txt → not installed here
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ──────────────────────────────────────────────────────────────────────────
  # Job 3 — Config validation
  # Loads all YAML configs and runs pipeline stages 1-6 (no MLflow, no GPU)
  # ──────────────────────────────────────────────────────────────────────────
  config-check:
    name: Config validation
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install framework dependencies
        run: pip install -r requirements.txt

      - name: Validate all YAML configs load
        run: |
          python -c "
          from src.core.config_loader import ConfigLoader
          cfg = ConfigLoader()
          loaded = cfg.load_all()
          print(f'Loaded {len(loaded)} config files: {list(loaded.keys())}')
          "

      - name: Run pipeline (framework-only — training disabled)
        env:
          # Override training.yaml to skip training; MLflow failure is non-fatal
          FIRE_TRAINING_ENABLED: "false"
        run: |
          python -c "
          import yaml
          from pathlib import Path

          # Patch training.yaml in-memory by monkey-patching ConfigLoader
          from src.core import config_loader as _cl
          _orig_load = _cl.ConfigLoader.load

          def _patched_load(self, filename):
              data = _orig_load(self, filename)
              if filename == 'training.yaml':
                  data = dict(data)
                  data['enabled'] = False   # skip GPU training in CI
              return data

          _cl.ConfigLoader.load = _patched_load

          from src.pipeline.orchestrator import PipelineOrchestrator
          o = PipelineOrchestrator()
          # Run only framework stages (1-6): stop before MLflowSmokeRun to avoid needing server
          stages_to_run = o.stages[:6]
          for stage in stages_to_run:
              ok = stage.run(o.ctx)
              print(f'  {stage.name}: {\"OK\" if ok else \"WARN\"}')
          print('Config check passed.')
          "
