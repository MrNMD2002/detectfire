name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:   # Cho phép chạy thủ công từ GitHub UI

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Job 1 — Lint
  # ────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Install ruff
        run: pip install ruff -q

      - name: Run ruff
        run: ruff check src/ tests/

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2 — Unit tests + coverage
  # Self-hosted runner: có đủ deps, không cần cài torch lại (đã có trên máy)
  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: Tests + Coverage
    runs-on: self-hosted
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Install framework dependencies
        run: |
          pip install -r requirements.txt -q
          pip install pytest-cov -q
          pip uninstall pytest-asyncio -y 2>/dev/null || true

      - name: Show python env
        run: |
          python --version
          pip show pytest pytest-cov
          echo "CWD: $(pwd)"
          echo "WORKSPACE: ${{ github.workspace }}"

      - name: Run tests with coverage
        env:
          PYTHONPATH: ${{ github.workspace }}
        working-directory: ${{ github.workspace }}
        run: python -m pytest tests/ -v --tb=long --cov=src --cov-report=term-missing --cov-report=xml:coverage.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ${{ github.workspace }}/coverage.xml

  # ────────────────────────────────────────────────────────────────────────────
  # Job 3 — Pipeline check
  # Self-hosted: có MLflow local → chạy được tất cả 12 stages (training=disabled)
  # ────────────────────────────────────────────────────────────────────────────
  pipeline-check:
    name: Pipeline check (12 stages, training disabled)
    runs-on: self-hosted
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Install framework dependencies
        run: pip install -r requirements.txt -q

      - name: Run full pipeline (training disabled)
        run: python -m src.pipeline.orchestrator

      - name: Upload pipeline reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-reports
          path: reports/

  # ────────────────────────────────────────────────────────────────────────────
  # Job 4 — Build Summary
  # Luôn chạy cuối để tổng kết kết quả tất cả jobs
  # ────────────────────────────────────────────────────────────────────────────
  build-summary:
    name: Build Summary
    runs-on: self-hosted
    needs: [lint, test, pipeline-check]
    if: always()

    steps:
      - name: Print pipeline results
        run: |
          echo "========================================"
          echo "  CI PIPELINE SUMMARY"
          echo "========================================"
          echo "  Lint:            ${{ needs.lint.result }}"
          echo "  Tests:           ${{ needs.test.result }}"
          echo "  Pipeline check:  ${{ needs.pipeline-check.result }}"
          echo "========================================"

      - name: Mark success
        if: |
          needs.lint.result == 'success' &&
          needs.test.result == 'success' &&
          needs.pipeline-check.result == 'success'
        run: |
          echo " ALL CHECKS PASSED — ready to merge/deploy."

      - name: Mark failure
        if: |
          needs.lint.result != 'success' ||
          needs.test.result != 'success' ||
          needs.pipeline-check.result != 'success'
        run: |
          echo " PIPELINE FAILED — check logs above."
          exit 1
