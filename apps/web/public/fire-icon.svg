<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Cyan glow for the outer shield -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Violet glow for the inner flame -->
    <filter id="glow-violet" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <linearGradient id="grad-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>

    <linearGradient id="grad-violet" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#6d28d9" />
    </linearGradient>
  </defs>

  <!-- Background base -->
  <rect width="100" height="100" rx="20" fill="#0f172a" />
  <rect width="96" height="96" x="2" y="2" rx="18" fill="none" stroke="#1e293b" stroke-width="2" />

  <!-- Outer tech shield / hexagon shape (Cyan) -->
  <path d="M50 15 L80 30 L80 70 L50 85 L20 70 L20 30 Z" fill="none" stroke="url(#grad-cyan)" stroke-width="4" filter="url(#glow-cyan)" stroke-linejoin="round" />

  <!-- Inner cyber flame shape (Violet/Purple) -->
  <path d="M50 25 C65 40 70 55 60 65 C50 75 40 75 35 65 C30 55 45 50 50 40 C45 45 35 45 40 35 C45 25 50 25 50 25 Z" fill="url(#grad-violet)" filter="url(#glow-violet)" />
  
  <!-- Core energy dot (White/Cyan) -->
  <circle cx="50" cy="55" r="5" fill="#e0f2fe" filter="url(#glow-cyan)" />
</svg>
