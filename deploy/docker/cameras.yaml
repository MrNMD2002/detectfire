# Camera Configuration
# Production cameras for fire/smoke detection

global:
  inference:
    model_path: "/app/models/best.onnx"
    device: "cpu"

defaults:
  fps_sample: 3
  imgsz: 640
  conf_fire: 0.5
  conf_smoke: 0.4
  conf_other: 0.4   # YOLOv26 class 2 - fire-related indicators
  window_size: 10
  fire_hits: 3
  smoke_hits: 3
  cooldown_sec: 60

cameras:
  - camera_id: "cam-01"
    site_id: "site-main"
    name: "Camera chính - 10.1.1.174"
    # Sửa đường dẫn RTSP bên dưới thành camera của bạn
    rtsp_url: "rtsp://root:Admin!123@10.1.1.174:554/cam/realmonitor?channel=1&subtype=0"
    enabled: true
