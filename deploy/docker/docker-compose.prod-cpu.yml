# Fire & Smoke Detection - CPU only (không cần GPU)
# Chạy: docker-compose -f docker-compose.prod-cpu.yml up -d


services:
  postgres:
    image: postgres:16-alpine
    container_name: fire-detect-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-fire_detect}
      POSTGRES_USER: ${DB_USER:-fire_detect}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-fire_detect}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fire-detect-net

  detector:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.detector.cpu
    container_name: fire-detect-detector
    restart: unless-stopped
    environment:
      RUST_LOG: ${LOG_LEVEL:-info}
      CONFIG_DIR: /app/configs
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      DB_PASSWORD: ${DB_PASSWORD:-devpassword}
      DB_ENCRYPTION_KEY: ${DB_ENCRYPTION_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    volumes:
      - ../../configs:/app/configs:ro
      - ../../models:/app/models:ro
      - snapshots:/app/snapshots
    networks:
      - fire-detect-net
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.api
      args:
        DATABASE_URL: postgres://${DB_USER:-fire_detect}:${DB_PASSWORD:-devpassword}@host.docker.internal:5432/${DB_NAME:-fire_detect}
    container_name: fire-detect-api
    restart: unless-stopped
    environment:
      RUST_LOG: ${LOG_LEVEL:-info}
      CONFIG_DIR: /app/configs
      DATABASE_URL: postgres://${DB_USER:-fire_detect}:${DB_PASSWORD:-devpassword}@postgres:5432/${DB_NAME:-fire_detect}
    volumes:
      - ../../configs:/app/configs:ro
      - snapshots:/app/snapshots
    ports:
      - "8080:8080"
    networks:
      - fire-detect-net
    depends_on:
      postgres:
        condition: service_healthy
      detector:
        condition: service_started

  web:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.web
    container_name: fire-detect-web
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - fire-detect-net
    depends_on:
      - api

volumes:
  postgres_data:
  snapshots:

networks:
  fire-detect-net:
    driver: bridge
