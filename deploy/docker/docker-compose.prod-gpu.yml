# Fire & Smoke Detection System
# Docker Compose for production deployment


services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: fire-detect-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-fire_detect}
      POSTGRES_USER: ${DB_USER:-fire_detect}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-fire_detect}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fire-detect-net

  # Detector Service (GPU)
  detector:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.detector
    container_name: fire-detect-detector
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      RUST_LOG: ${LOG_LEVEL:-debug}
      CONFIG_DIR: /app/configs
      LOG_FORMAT: pretty
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      DB_ENCRYPTION_KEY: ${DB_ENCRYPTION_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    volumes:
      - ../../configs:/app/configs:ro
      - ../../models:/app/models:ro
      - snapshots:/app/snapshots
    networks:
      - fire-detect-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:51051/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    # Add logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # API Service
  api:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.api
      args:
        DATABASE_URL: postgres://${DB_USER:-fire_detect}:${DB_PASSWORD:-changeme}@host.docker.internal:5432/${DB_NAME:-fire_detect}
    container_name: fire-detect-api
    restart: unless-stopped
    environment:
      RUST_LOG: ${LOG_LEVEL:-info}
      CONFIG_DIR: /app/configs
      DATABASE_URL: postgres://${DB_USER:-fire_detect}:${DB_PASSWORD:-changeme}@postgres:5432/${DB_NAME:-fire_detect}
    volumes:
      - ../../configs:/app/configs:ro
      - snapshots:/app/snapshots
    ports:
      - "8080:8080"
    networks:
      - fire-detect-net
    depends_on:
      postgres:
        condition: service_healthy
      detector:
        condition: service_started

  # Web UI
  web:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.web
    container_name: fire-detect-web
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - fire-detect-net
    depends_on:
      - api

  # Grafana (optional monitoring)
  grafana:
    image: grafana/grafana:latest
    container_name: fire-detect-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - fire-detect-net
    depends_on:
      - loki
    profiles:
      - monitoring

  # Loki (log aggregation)
  loki:
    image: grafana/loki:2.9.0
    container_name: fire-detect-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - fire-detect-net
    profiles:
      - monitoring

  # Promtail (log collector)
  promtail:
    image: grafana/promtail:2.9.0
    container_name: fire-detect-promtail
    restart: unless-stopped
    volumes:
      - ../promtail.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - fire-detect-net
    depends_on:
      - loki
    profiles:
      - monitoring

volumes:
  postgres_data:
  snapshots:
  grafana_data:
  loki_data:

networks:
  fire-detect-net:
    driver: bridge
