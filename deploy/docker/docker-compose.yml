# Fire & Smoke Detection - Default stack (CPU detector)
# Chạy từ thư mục này: docker-compose up -d
# GPU: docker-compose -f docker-compose.prod-gpu.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: fire-detect-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-fire_detect}
      POSTGRES_USER: ${DB_USER:-fire_detect}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-fire_detect}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fire-detect-net

  detector:
    image: fire-detect-detector:latest
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.detector
    container_name: fire-detect-detector
    restart: unless-stopped
    runtime: nvidia
    environment:
      RUST_LOG: ${LOG_LEVEL:-info}
      CONFIG_DIR: /app/configs
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility,video
      CAM_01_RTSP_URL: ${CAM_01_RTSP_URL}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      # TensorRT EP: FP16 + engine cache (trt_engines volume)
      ORT_TENSORRT_FP16_ENABLE: "1"
      ORT_TENSORRT_ENGINE_CACHE_ENABLE: "1"
      ORT_TENSORRT_CACHE_PATH: /app/trt_engines/
    volumes:
      - ../../configs:/app/configs:ro
      - ../../models:/app/models:ro
      - snapshots:/app/snapshots
      - trt_engines:/app/trt_engines
    networks:
      - fire-detect-net
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  api:
    image: fire-detect-api:latest
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.api
      # No DATABASE_URL build arg needed: SQLx offline mode (.sqlx/ cache) used at build time.
      # Migrations run at container startup via sqlx::migrate!() in main.rs.
    container_name: fire-detect-api
    restart: unless-stopped
    environment:
      RUST_LOG: ${LOG_LEVEL:-info}
      CONFIG_DIR: /app/configs
      DATABASE_URL: postgres://${DB_USER:-fire_detect}:${DB_PASSWORD:-devpassword}@postgres:5432/${DB_NAME:-fire_detect}
      DB_ENCRYPTION_KEY: ${DB_ENCRYPTION_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      # Properly-prefixed vars for the `config` crate (prefix FIRE_DETECT + separator __)
      FIRE_DETECT__DATABASE__ENCRYPTION_KEY: ${DB_ENCRYPTION_KEY}
      FIRE_DETECT__AUTH__JWT_SECRET: ${JWT_SECRET}
      FIRE_DETECT__TELEGRAM__BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      FIRE_DETECT__TELEGRAM__DEFAULT_CHAT_ID: ${TELEGRAM_CHAT_ID}
    volumes:
      - ../../configs:/app/configs
      - snapshots:/app/snapshots
    ports:
      - "8080:8080"
    networks:
      - fire-detect-net
    depends_on:
      postgres:
        condition: service_healthy
      detector:
        condition: service_started

  web:
    image: fire-detect-web:latest
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.web
    container_name: fire-detect-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    networks:
      - fire-detect-net
    depends_on:
      - api

volumes:
  postgres_data:
  snapshots:
  trt_engines:

networks:
  fire-detect-net:
    driver: bridge
