server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ────────────────────────────────────────────────────────
    # Prevent page from being embedded in iframes (clickjacking protection)
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Stop browsers from MIME-sniffing the response type
    add_header X-Content-Type-Options "nosniff" always;

    # Enable XSS filter in older browsers
    add_header X-XSS-Protection "1; mode=block" always;

    # Restrict referrer information sent to third parties
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Basic Content-Security-Policy – tighten per environment as needed
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' ws: wss:; font-src 'self'; object-src 'none'; frame-ancestors 'none';" always;

    # Permissions policy – disable unused powerful features
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # HSTS – uncomment and set a real domain when TLS is configured
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # ────────────────────────────────────────────────────────────────────────────

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # API proxy
    location /api/ {
        proxy_pass http://api:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket proxy
    location /ws/ {
        proxy_pass http://api:8080/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
