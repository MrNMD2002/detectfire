# Ruff — Python linter config
# Docs: https://docs.astral.sh/ruff/configuration/

line-length = 100
target-version = "py311"

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long (handled by formatter)
    "F401",  # unused import (too noisy for ML code with optional deps)
    "UP007", # Use X | Y for type annotations (keep compat with 3.9)
]

[lint.per-file-ignores]
"tests/**" = ["F811"]  # redefined-while-unused (pytest fixtures)
